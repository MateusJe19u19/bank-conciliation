<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Betim Reciclagem</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .offline-container {
            max-width: 400px;
            padding: 30px;
            background-color: #34495e;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 {
            margin-bottom: 20px;
            color: #e74c3c;
        }
        
        p {
            margin-bottom: 20px;
            line-height: 1.6;
            color: #ecf0f1;
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .retry-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .retry-btn:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">📡</div>
        <h1>Você está offline</h1>
        <p>Não foi possível conectar ao servidor. Verifique sua conexão com a internet e tente novamente.</p>
        <p>Os dados salvos enquanto estiver offline serão sincronizados automaticamente quando a conexão for restabelecida.</p>
        <button class="retry-btn" onclick="window.location.reload()">Tentar novamente</button>
    </div>
</body>
</html>
