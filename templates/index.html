<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betim Reciclagem - Sistema de Gestão</title>
    
    <!-- PWA Meta Tags (adicionado) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Betim Reciclagem">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- PWA Manifest (adicionado) -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- Apple Touch Icons (adicionado) -->
    <link rel="apple-touch-icon" href="/static/icons/icon-152x152.png">
    
    <!-- CSS original -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Service Worker Registration (adicionado) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado');
                    })
                    .catch(error => {
                        console.log('Falha no registro do ServiceWorker:', error);
                    });
            });
        }
    </script>
</head>
<body>
    <div class="header">
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showPage('saldos')">SALDOS</button>
            <button class="nav-btn" onclick="showPage('rnc')">RNC</button>
        </div>
        
        <div class="filters">
            <select id="mesSelect">
                <option value="1">Janeiro</option>
                <option value="2">Fevereiro</option>
                <option value="3">Março</option>
                <option value="4">Abril</option>
                <option value="5">Maio</option>
                <option value="6">Junho</option>
                <option value="7">Julho</option>
                <option value="8">Agosto</option>
                <option value="9">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
            <select id="anoSelect">
                <option value="2026">2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>
                <option value="2029">2029</option>
                <option value="2030">2030</option>
            </select>
            <button class="filter-btn" onclick="filtrar()">Filtrar</button>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" onclick="importarExtratos()">📁 Importar Extratos</button>
            <button class="action-btn" onclick="gerarZip()">📦 Gerar ZIP</button>
            <button class="action-btn" onclick="gerarPDF()">📄 Ver PDF</button>
        </div>
    </div>

    <div id="saldosPage" class="page active">
        <iframe id="saldosFrame" src="/saldos" frameborder="0" width="100%" height="100%"></iframe>
    </div>
    
    <div id="rncPage" class="page">
        <iframe id="rncFrame" src="/rnc" frameborder="0" width="100%" height="100%"></iframe>
    </div>

    <!-- Script original -->
    <script src="/static/js/script.js"></script>
    
    <!-- Script offline adicional (novo) -->
    <script src="/static/js/db-offline.js"></script>
</body>
</html>
